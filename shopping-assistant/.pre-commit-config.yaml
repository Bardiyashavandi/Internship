repos:
  - repo: local
    hooks:
      - id: end-of-file-fixer
        name: Fix End of Files
        entry: end-of-file-fixer
        language: system
        types: [text]
        stages: [pre-commit]
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [pre-commit]
      - id: semgrep
        name: Semgrep Custom Security Scan
        entry: /opt/homebrew/bin/semgrep --error --config .semgrep/rules.yaml
        language: system
        types: [python]
        stages: [pre-commit]
